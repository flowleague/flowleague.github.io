<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>flowleague</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #ffffff;
      color: #111111;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text",
                   "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .logo-full {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .logo-full img {
      width: 75vw;          /* 宽度最多占视口宽度的 75% */
      max-height: 75vh;     /* 高度最多占视口高度的 75% */
      max-width: 100%;
      object-fit: contain;
    }

    .coming {
      text-align: center;
      font-size: 12px;
      letter-spacing: 0.24em;
      text-transform: lowercase;
      color: #666666;
      padding: 12px 16px 20px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo-full">
      <!-- 确保 logo.svg 和 index.html 在同一文件夹 -->
      <img src="logo.svg" alt="flowleague">
    </div>
    <div class="coming">coming soon</div>
  </div>
</body>
</html>
