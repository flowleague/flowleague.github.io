<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>flowleague · coming soon</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text",
                   "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #ffffff;
      color: #111111;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 40px 20px;
      text-align: center;
    }

    .logo-box {
      width: 120px;
      height: 120px;
      border-radius: 16px;
      border: 1px solid #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #f8f8f8;
    }

    .logo-box img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .coming {
      font-size: 14px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #666666;
    }

    .name {
      font-size: 12px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: #999999;
      margin-top: 4px;
    }

    footer {
      position: fixed;
      bottom: 16px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 11px;
      color: #aaaaaa;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="logo-box">
      <!-- 把 logo.png 放在和 index.html 同一文件夹 -->
      <img src="logo.png" alt="flowleague logo">
    </div>
    <div class="coming">coming soon</div>
    <div class="name">flowleague</div>
  </main>

  <footer>
    © <span id="year"></span> flowleague · under construction
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
